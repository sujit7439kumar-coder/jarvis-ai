<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🤖 JARVIS AI</h1>

  <p class="status" id="status">
    Click the button and start speaking...
  </p>

  <button id="start-btn">
    🎤 Start Talking
  </button>

  <div class="chat-box">

    <div class="user-box">
      <h3>You</h3>
      <p id="user-text">...</p>
    </div>

    <div class="ai-box">
      <h3>Jarvis</h3>
      <p id="ai-text">Waiting...</p>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
